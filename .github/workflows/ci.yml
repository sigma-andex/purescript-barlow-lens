name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # spago 1.x uses node:sqlite, stable only from Node 24
          node-version: "24"

      - uses: purescript-contrib/setup-purescript@main
        with:
          purescript: "0.15.16"
          # NB: setup-purescript's "latest" is spago-LEGACY (Dhall). New spago
          # comes only from "unstable" or a pinned 1.x version.
          spago: "1.0.4"

      - name: Cache PureScript dependencies
        uses: actions/cache@v4
        # Keyed on spago.lock so the cache is rebuilt when dependencies change.
        # Caches installed packages (.spago) and compiled output (output).
        with:
          key: ${{ runner.os }}-spago-${{ hashFiles('spago.lock') }}
          path: |
            .spago
            output

      - run: spago build

      - run: spago test
